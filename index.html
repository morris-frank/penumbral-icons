<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penumbral Icons - Theme-Safe Icon Pack</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-neutral-50: #FAF8F5;
      --color-neutral-100: #F3EFEA;
      --color-neutral-300: #DCD4C7;
      --color-neutral-400: #B8AC9D;
      --color-neutral-600: #8C7E72;
      --color-neutral-900: #2D2825;
      --color-accent-terracotta: #D78A7A;
      --color-accent-ochre: #A78D73;
      --color-accent-slate: #4A3E36;
      --radius-sm: 2px;
      --radius-md: 4px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "andale mono", andale mono, monospace;
      background-color: var(--color-neutral-100);
      color: var(--color-neutral-900);
      background-image:
        radial-gradient(at 0% 0%, rgba(215, 138, 122, 0.08) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(126, 150, 136, 0.08) 0px, transparent 50%);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .icons-grid {
      grid-template-columns: repeat(auto-fill, 8rem);
    }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: rgba(81, 70, 62, 0.05);
    }

    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: var(--color-neutral-300);
      border-radius: var(--radius-md);
    }

    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: var(--color-neutral-400);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"andale mono"', 'andale mono', 'monospace'],
            mono: ['"andale mono"', 'andale mono', 'monospace'],
          },
          colors: {
            neutral: {
              50: 'var(--color-neutral-50)',
              100: 'var(--color-neutral-100)',
              300: 'var(--color-neutral-300)',
              400: 'var(--color-neutral-400)',
              600: 'var(--color-neutral-600)',
              900: 'var(--color-neutral-900)',
            },
            accent: {
              terracotta: 'var(--color-accent-terracotta)',
              ochre: 'var(--color-accent-ochre)',
              slate: 'var(--color-accent-slate)',
            },
          },
          borderRadius: {
            sm: 'var(--radius-sm)',
          },
        },
      },
    };
  </script>
</head>
<body class="font-sans min-h-screen flex flex-col antialiased selection:bg-accent-terracotta/20 selection:text-neutral-900">

  <main class="flex-grow w-full px-5 sm:px-6 py-4 flex flex-col gap-4">

    <div class="flex flex-wrap items-center justify-between gap-x-4 gap-y-2">
      <a href="https://github.com/morris-frank/penumbral-icons" target="_blank" rel="noopener noreferrer" class="text-xs text-neutral-600 hover:text-neutral-900 transition-colors w-fit">
        morris-frank/penumbral-icons
      </a>
      <div class="flex items-center justify-end gap-4 shrink-0">
        <input type="text" id="search-input" oninput="handleFilterChange()" placeholder="search" class="w-40 sm:w-52 bg-transparent border-b border-neutral-300 h-7 py-0 text-xs leading-none text-neutral-900 placeholder-neutral-400 focus:outline-none focus:border-neutral-600 transition-colors">
        <div class="flex items-center gap-2 text-xs h-7 leading-none">
          <button id="profile-btn-notion" type="button" onclick="setAppProfile('notion')" class="text-neutral-900 transition-colors">notion</button>
          <span class="text-neutral-300">/</span>
          <button id="profile-btn-linear" type="button" onclick="setAppProfile('linear')" class="text-neutral-400 hover:text-neutral-600 transition-colors">linear</button>
        </div>
      </div>
    </div>

    <div id="icons-grid" class="icons-grid grid gap-x-8 gap-y-10 w-full min-h-[120px] pt-2 justify-center">
      <div class="col-span-full py-8 text-xs text-neutral-400">loading…</div>
    </div>

    <div id="empty-state" class="hidden py-8 text-xs text-neutral-400">
      no icons match
      <button type="button" onclick="resetFilters()" class="ml-2 text-neutral-600 hover:text-neutral-900 transition-colors">reset</button>
    </div>

    <footer class="mt-auto text-[10px] text-neutral-400/50 py-2">
      penumbral icons · sharp, lobehub icons, simple icons
    </footer>

  </main>

  <!-- Modal for full details -->
  <div id="details-modal" class="hidden fixed inset-0 z-50 overflow-y-auto bg-accent-slate/40 backdrop-blur-sm flex items-center justify-center p-4" onclick="if (event.target === this) closeModal()">
    <div class="bg-neutral-50 max-w-xl w-full max-h-[90vh] overflow-hidden flex flex-col shadow-[0_24px_64px_-12px_rgba(45,40,37,0.38),0_12px_32px_-16px_rgba(45,40,37,0.22)] animate-in fade-in zoom-in-95 duration-200" onclick="event.stopPropagation()">
      <div class="relative">
        <button type="button" onclick="closeModal()" class="absolute top-2 right-2 z-10 w-7 h-7 text-neutral-600 hover:text-neutral-900 flex items-center justify-center transition-colors" aria-label="Close">
          <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <div class="grid grid-cols-2 gap-0">
          <div id="modal-preview-light" class="h-44 flex items-center justify-center bg-white relative overflow-hidden">
            <img id="modal-img-light" src="" alt="Light preview" class="w-28 h-28 object-contain relative">
          </div>
          <div id="modal-preview-dark" class="h-44 flex items-center justify-center bg-[#191919] relative overflow-hidden">
            <img id="modal-img-dark" src="" alt="Dark preview" class="w-28 h-28 object-contain relative">
          </div>
        </div>
      </div>
      <div class="flex items-center justify-between gap-3 px-5 pt-3">
        <h4 id="modal-label" class="text-left text-base font-bold text-neutral-900">Icon Details</h4>
        <button type="button" id="modal-copy-btn" onclick="copyModalImage()" class="text-xs text-neutral-400 hover:text-neutral-900 transition-colors">copy</button>
      </div>
      <div class="px-5 pb-5 pt-4 overflow-y-auto custom-scrollbar flex flex-col gap-4">
        <div class="flex flex-col gap-1.5 text-xs">
          <span class="text-[10px] text-neutral-600 font-bold uppercase tracking-wider">Source Reference Link/Key</span>
          <code id="modal-source-ref" class="block bg-neutral-100 p-2.5 rounded-sm border border-neutral-300 font-mono text-neutral-800 break-all select-all"></code>
        </div>

        <p id="modal-notes-container" class="hidden text-xs text-neutral-600"></p>
      </div>
    </div>
  </div>

  <script>
    let iconsData = [];
    let profilesById = {};
    let currentProfile = 'notion';
    let currentModalImagePath = '';
    let activeFilters = { search: '' };

    async function init() {
      const grid = document.getElementById('icons-grid');
      try {
        const [manifestRes, profilesRes] = await Promise.all([
          fetch('./dist/reports/manifest.json'),
          fetch('./config/profiles.json'),
        ]);
        if (!manifestRes.ok || !profilesRes.ok) {
          throw new Error('Failed to load data');
        }
        iconsData = await manifestRes.json();
        profilesById = Object.fromEntries(
          (await profilesRes.json()).map((profile) => [profile.id, profile]),
        );
      } catch {
        grid.innerHTML = '<div class="col-span-full py-8 text-xs text-neutral-400">run build and serve over http to load icons</div>';
        return;
      }

      setAppProfile('notion');
    }

    function setAppProfile(profileId) {
      currentProfile = profileId;

      const notionBtn = document.getElementById('profile-btn-notion');
      const linearBtn = document.getElementById('profile-btn-linear');

      if (profileId === 'notion') {
        notionBtn.className = 'text-neutral-900 transition-colors';
        linearBtn.className = 'text-neutral-400 hover:text-neutral-600 transition-colors';
      } else {
        linearBtn.className = 'text-neutral-900 transition-colors';
        notionBtn.className = 'text-neutral-400 hover:text-neutral-600 transition-colors';
      }

      renderGrid();
    }

    function handleFilterChange() {
      activeFilters.search = document.getElementById('search-input').value.trim().toLowerCase();
      renderGrid();
    }

    function resetFilters() {
      document.getElementById('search-input').value = '';
      handleFilterChange();
    }

    function renderGrid() {
      const grid = document.getElementById('icons-grid');
      const emptyState = document.getElementById('empty-state');
      const profile = profilesById[currentProfile];

      grid.innerHTML = '';

      const filtered = iconsData.filter((icon) => {
        if (!activeFilters.search) return true;
        return icon.label.toLowerCase().includes(activeFilters.search) ||
          icon.slug.toLowerCase().includes(activeFilters.search) ||
          (icon.notes && icon.notes.toLowerCase().includes(activeFilters.search));
      });

      if (filtered.length === 0) {
        grid.className = 'hidden';
        emptyState.className = 'py-8 text-xs text-neutral-400';
        return;
      }

      grid.className = 'icons-grid grid gap-x-8 gap-y-10 w-full pt-2 justify-center';
      emptyState.className = 'hidden';

      filtered.forEach((icon) => {
        const item = document.createElement('div');
        item.className = 'group relative flex flex-col w-32 min-w-0 pt-6';

        const imagePath = icon.outputs[currentProfile] || `dist/${currentProfile}/emoji/${icon.slug}.png`;

        item.innerHTML = `
          <span class="absolute top-0 left-0 right-0 text-sm text-neutral-600 truncate opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">${icon.slug}</span>
          <div class="overflow-hidden w-32 h-32 relative flex items-center justify-center" style="background: linear-gradient(135deg, ${profile.lightBg} 50%, ${profile.darkBg} 50%);">
            <img src="${imagePath}" alt="${icon.label}" class="w-16 h-16 object-contain relative z-10" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'32\\' height=\\'32\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'red\\' stroke-width=\\'2\\'><circle cx=\\'12\\' cy=\\'12\\' r=\\'10\\'/><line x1=\\'12\\' y1=\\'8\\' x2=\\'12\\' y2=\\'16\\'/><line x1=\\'8\\' y1=\\'12\\' x2=\\'16\\' y2=\\'12\\'/></svg>'">
            <button type="button" onclick="openModalForIcon('${icon.slug}')" class="absolute inset-0 z-20 opacity-0 hover:opacity-100 focus:opacity-100 transition-opacity" title="${icon.slug}"></button>
          </div>
        `;

        grid.appendChild(item);
      });
    }

    function openModalForIcon(slug) {
      const icon = iconsData.find((entry) => entry.slug === slug);
      if (!icon) return;

      const profile = profilesById[currentProfile];
      const imagePath = icon.outputs[currentProfile] || `dist/${currentProfile}/emoji/${icon.slug}.png`;
      currentModalImagePath = imagePath;
      document.getElementById('modal-copy-btn').innerText = 'copy';
      document.getElementById('modal-label').innerText = icon.label;
      document.getElementById('modal-source-ref').innerText = icon.sourceRef;

      const previewLight = document.getElementById('modal-preview-light');
      const previewDark = document.getElementById('modal-preview-dark');
      previewLight.style.backgroundColor = profile.lightBg;
      previewDark.style.backgroundColor = profile.darkBg;
      document.getElementById('modal-img-light').src = imagePath;
      document.getElementById('modal-img-dark').src = imagePath;

      const notesContainer = document.getElementById('modal-notes-container');
      if (icon.notes) {
        notesContainer.textContent = icon.notes;
        notesContainer.classList.remove('hidden');
      } else {
        notesContainer.textContent = '';
        notesContainer.classList.add('hidden');
      }

      document.getElementById('details-modal').classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
    }

    function closeModal() {
      document.getElementById('details-modal').classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
    }

    async function copyModalImage() {
      const btn = document.getElementById('modal-copy-btn');
      btn.innerText = '…';

      try {
        const blob = await getModalImageBlob();
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob }),
        ]);
        btn.innerText = 'copied';
      } catch {
        btn.innerText = 'failed';
      }

      setTimeout(() => { btn.innerText = 'copy'; }, 1200);
    }

    async function getModalImageBlob() {
      try {
        const response = await fetch(currentModalImagePath);
        if (!response.ok) throw new Error('fetch failed');
        const blob = await response.blob();
        if (blob.type === 'image/png') return blob;
        return blob.slice(0, blob.size, 'image/png');
      } catch {
        const img = document.getElementById('modal-img-light');
        if (!img.complete || !img.naturalWidth) {
          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
          });
        }

        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        canvas.getContext('2d').drawImage(img, 0, 0);

        return new Promise((resolve, reject) => {
          canvas.toBlob((blob) => {
            if (blob) resolve(blob);
            else reject(new Error('canvas failed'));
          }, 'image/png');
        });
      }
    }

    window.onload = init;
  </script>
</body>
</html>
