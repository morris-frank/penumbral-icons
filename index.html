/*
  Maurice Frank - Design Tokens
  Inspired by the warm, editorial, alpine aesthetic of the "Atlas Sketch".
  Date: June 15, 2026
*/

:root {
  /* --- Color Palette (Sampled from Image) --- */
  
  /* Neutrals (Warm, organic linen & stone) */
  --color-neutral-50:  #FAF8F5; /* Alabaster / Softest Warm White */
  --color-neutral-100: #F3EFEA; /* Linen / Primary Background */
  --color-neutral-200: #EAE4DA; /* Sand / Secondary Background */
  --color-neutral-300: #DCD4C7; /* Stone / Muted Borders & Backgrounds */
  --color-neutral-400: #B8AC9D; /* Clay / Muted Text & Borders */
  --color-neutral-600: #8C7E72; /* Warm Gray / Secondary Text */
  --color-neutral-800: #51463E; /* Dark Earth / Muted Headings */
  --color-neutral-900: #2D2825; /* Charcoal / Primary Text */

  /* Accents (Alpine & Sunset tones) */
  --color-accent-terracotta:       #D78A7A; /* Sunset Peak (Warm Coral/Terracotta) */
  --color-accent-terracotta-light: #F5D6D0; /* Soft Terracotta Tint */
  --color-accent-glacier:          #7E9688; /* Glacier Green (Muted Sage/Teal) */
  --color-accent-glacier-light:    #C4D3CB; /* Soft Glacier Tint */
  --color-accent-ochre:            #A78D73; /* Mountain Ochre (Warm Gold/Brown) */
  --color-accent-slate:            #4A3E36; /* Deep Alpine Slate (Dark Shadow Brown) */

  /* Semantic Colors */
  --bg-primary:    var(--color-neutral-100);
  --bg-secondary:  var(--color-neutral-200);
  --bg-card:       rgba(250, 248, 245, 0.75); /* Translucent Alabaster */
  
  --text-primary:   var(--color-neutral-900);
  --text-secondary: var(--color-neutral-600);
  --text-muted:     var(--color-neutral-400);
  --text-accent:    var(--color-accent-terracotta);

  --border-light:  rgba(255, 255, 255, 0.4);
  --border-medium: var(--color-neutral-300);
  --border-dark:   var(--color-neutral-800);

  /* --- Typography --- */
  
  /* Font Families */
  --font-sans:  "andale mono", andale mono, monospace;

  /* Font Sizes (Modular Scale - 1.25 Ratio) */
  --font-size-xs:   0.8rem;
  --font-size-sm:   0.875rem;
  --font-size-base: 1rem;
  --font-size-md:   1.25rem;
  --font-size-lg:   1.563rem;
  --font-size-xl:   1.953rem;
  --font-size-2xl:  2.441rem;
  --font-size-3xl:  3.052rem;

  /* Font Weights */
  --font-weight-light:  300;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-bold:   700;

  /* Line Heights */
  --line-height-tight:  1.2;
  --line-height-normal: 1.5;
  --line-height-relaxed: 1.75;

  /* Letter Spacing */
  --letter-spacing-tight:  -0.02em;
  --letter-spacing-normal: 0;
  --letter-spacing-wide:   0.05em;
  --letter-spacing-widest: 0.15em;

  /* --- Spacing (Modular Scale) --- */
  --spacing-xs:  0.25rem;
  --spacing-sm:  0.5rem;
  --spacing-md:  1rem;
  --spacing-lg:  1.5rem;
  --spacing-xl:  2rem;
  --spacing-2xl: 3rem;
  --spacing-3xl: 4rem;

  /* --- Borders & Effects --- */
  --radius-sm:   2px;
  --radius-md:   4px;
  --radius-lg:   8px;
  --radius-full: 9999px;

  /* Glassmorphism / Translucency */
  --blur-card: blur(12px);

  /* Transitions */
  --transition-fast:   0.15s ease;
  --transition-normal: 0.3s ease;
}

/* --- Basic Reset & Utility Styles using Tokens --- */

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background-color: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: var(--font-size-base);
  line-height: var(--line-height-normal);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* Typography Utilities */
h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-sans);
  color: var(--color-neutral-900);
  line-height: var(--line-height-tight);
  font-weight: var(--font-weight-normal);
}

p {
  margin-bottom: var(--spacing-md);
}

.font-sans  { font-family: var(--font-sans); }

.text-xs   { font-size: var(--font-size-xs); }
.text-sm   { font-size: var(--font-size-sm); }
.text-base { font-size: var(--font-size-base); }
.text-md   { font-size: var(--font-size-md); }
.text-lg   { font-size: var(--font-size-lg); }
.text-xl   { font-size: var(--font-size-xl); }
.text-2xl  { font-size: var(--font-size-2xl); }
.text-3xl  { font-size: var(--font-size-3xl); }

.text-primary   { color: var(--text-primary); }
.text-secondary { color: var(--text-secondary); }
.text-muted      { color: var(--text-muted); }
.text-accent     { color: var(--text-accent); }

.tracking-tight  { letter-spacing: var(--letter-spacing-tight); }
.tracking-normal { letter-spacing: var(--letter-spacing-normal); }
.tracking-wide   { letter-spacing: var(--letter-spacing-wide); }
.tracking-widest { letter-spacing: var(--letter-spacing-widest); }

/* Layout & Card Utilities */
.card {
  background-color: var(--bg-card);
  backdrop-filter: var(--blur-card);
  -webkit-backdrop-filter: var(--blur-card);
  border: 1px solid var(--border-light);
  padding: var(--spacing-xl);
  border-radius: var(--radius-sm);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--spacing-xl);
}

    body {
      background-color: var(--bg-primary);

    // State
    let iconsData = [];
    let currentProfile = 'notion'; // default
    let activeFilters = {
      search: ''
    };

    // Profiles Configuration matching config/profiles.json
    const PROFILES = {
      notion: {
        id: 'notion',
        lightBg: '#ffffff',
        darkBg: '#191919',
        lightFg: '#191919',
        darkFg: '#ffffff'
      },
      linear: {
        id: 'linear',
        lightBg: '#fcfcfd',
        darkBg: '#0f1010',
        lightFg: '#0f1010',
        darkFg: '#ffffff'
      }
    };

    // Initialize Page
    async function init() {
      try {
        // Attempt dynamically loading manifest first
        const response = await fetch('./dist/reports/manifest.json');
        if (response.ok) {
          iconsData = await response.json();
          console.log('Successfully fetched live manifest.json');
        } else {
          throw new Error('Failed to fetch manifest');
        }
      } catch (err) {
        console.warn('Falling back to embedded manifest copy:', err.message);
        iconsData = EMBEDDED_MANIFEST;
      }

      // Set App Profile UI
      setAppProfile('notion');
    }

    // Update active profile configuration
    function setAppProfile(profileId) {
      currentProfile = profileId;

      // Update UI Toggles
      const notionBtn = document.getElementById('profile-btn-notion');
      const linearBtn = document.getElementById('profile-btn-linear');

      if (profileId === 'notion') {
        notionBtn.className = "text-neutral-900 transition-colors";
        linearBtn.className = "text-neutral-400 hover:text-neutral-600 transition-colors";
      } else {
        linearBtn.className = "text-neutral-900 transition-colors";
        notionBtn.className = "text-neutral-400 hover:text-neutral-600 transition-colors";
      }

      // Re-render the grid since backgrounds and output paths change!
      renderGrid();
    }

    // Filter controls
    function handleFilterChange() {
      activeFilters.search = document.getElementById('search-input').value.trim().toLowerCase();
      renderGrid();
    }

    function resetFilters() {
      document.getElementById('search-input').value = '';
      handleFilterChange();
    }

    // Render Grid Cards
    function renderGrid() {
      const grid = document.getElementById('icons-grid');
      const emptyState = document.getElementById('empty-state');
      const profile = PROFILES[currentProfile];

      // Clear grid
      grid.innerHTML = '';

      // Filter icons
      const filtered = iconsData.filter(icon => {
        if (!activeFilters.search) return true;
        return icon.label.toLowerCase().includes(activeFilters.search) ||
          icon.slug.toLowerCase().includes(activeFilters.search) ||
          (icon.notes && icon.notes.toLowerCase().includes(activeFilters.search));
      });

      if (filtered.length === 0) {
        grid.className = "hidden";
        emptyState.className = "py-8 text-xs text-neutral-400";
        return;
      }

      grid.className = "grid gap-x-8 gap-y-10 w-full pt-2";
      grid.style.gridTemplateColumns = "repeat(auto-fill, 8rem)";
      emptyState.className = "hidden";

      filtered.forEach(icon => {
        const item = document.createElement('div');
        item.className = "group relative flex flex-col w-32 min-w-0 pt-6";

        const imagePath = icon.outputs[currentProfile] || `dist/${currentProfile}/emoji/${icon.slug}.png`;

        item.innerHTML = `
          <span class="absolute top-0 left-0 right-0 text-sm text-neutral-600 truncate opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">${icon.slug}</span>
          <div class="overflow-hidden w-32 h-32 relative flex items-center justify-center" style="background: linear-gradient(135deg, ${profile.lightBg} 50%, ${profile.darkBg} 50%);">
            <img src="${imagePath}" alt="${icon.label}" class="w-16 h-16 object-contain relative z-10" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'32\\' height=\\'32\\' viewBox=\\'0 0 24 24\\' fill=\\'none\\' stroke=\\'red\\' stroke-width=\\'2\\'><circle cx=\\'12\\' cy=\\'12\\' r=\\'10\\'/><line x1=\\'12\\' y1=\\'8\\' x2=\\'12\\' y2=\\'16\\'/><line x1=\\'8\\' y1=\\'12\\' x2=\\'16\\' y2=\\'12\\'/></svg>'">
            <button type="button" onclick="openModalForIcon('${icon.slug}')" class="absolute inset-0 z-20 opacity-0 hover:opacity-100 focus:opacity-100 transition-opacity" title="${icon.slug}"></button>
          </div>
        `;

        grid.appendChild(item);
      });
    }

    let currentModalImagePath = '';

    // Modal Operations
    function openModalForIcon(slug) {
      const icon = iconsData.find(i => i.slug === slug);
      if (!icon) return;

      const profile = PROFILES[currentProfile];
      const imagePath = icon.outputs[currentProfile] || `dist/${currentProfile}/emoji/${icon.slug}.png`;
      currentModalImagePath = imagePath;
      document.getElementById('modal-copy-btn').innerText = 'copy';

      // Labels & Strings
      document.getElementById('modal-label').innerText = icon.label;
      document.getElementById('modal-source-ref').innerText = icon.sourceRef;

      const previewLight = document.getElementById('modal-preview-light');
      const previewDark = document.getElementById('modal-preview-dark');
      previewLight.style.backgroundColor = profile.lightBg;
      previewDark.style.backgroundColor = profile.darkBg;

      // Update Images
      document.getElementById('modal-img-light').src = imagePath;
      document.getElementById('modal-img-dark').src = imagePath;

      // Handle notes container
      const notesContainer = document.getElementById('modal-notes-container');
      if (icon.notes) {
        notesContainer.classList.remove('hidden');
        document.getElementById('modal-notes').innerText = icon.notes;
      } else {
        notesContainer.classList.add('hidden');
      }

      // Show Modal
      document.getElementById('details-modal').classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
    }

    function closeModal() {
      document.getElementById('details-modal').classList.add('hidden');
      document.body.classList.remove('overflow-hidden');
    }

    async function copyModalImage() {
      const btn = document.getElementById('modal-copy-btn');
      btn.innerText = '…';

      try {
        const blob = await getModalImageBlob();
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        btn.innerText = 'copied';
      } catch {
        btn.innerText = 'failed';
      }

      setTimeout(() => { btn.innerText = 'copy'; }, 1200);
    }

    async function getModalImageBlob() {
      try {
        const response = await fetch(currentModalImagePath);
        if (!response.ok) throw new Error('fetch failed');
        const blob = await response.blob();
        if (blob.type === 'image/png') return blob;
        return blob.slice(0, blob.size, 'image/png');
      } catch {
        const img = document.getElementById('modal-img-light');
        if (!img.complete || !img.naturalWidth) {
          await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
          });
        }

        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        canvas.getContext('2d').drawImage(img, 0, 0);

        return new Promise((resolve, reject) => {
          canvas.toBlob((blob) => {
            if (blob) resolve(blob);
            else reject(new Error('canvas failed'));
          }, 'image/png');
        });
      }
    }

    // Run init on load
    window.onload = init;
  </script>
